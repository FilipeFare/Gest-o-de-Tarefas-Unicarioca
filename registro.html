<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - UniCarioca</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <div class="navbar-content">
            <span class="brand">UniCarioca</span>
            <span class="project-name">Ciência da Computação</span>
        </div>
    </header>
    <div class="main-content">
        <div class="container">
            <div class="welcome-section">
                <h1>Criar Conta</h1>
                <p>Registre-se para começar a organizar suas atividades.</p>
            </div>
            <div id="mensagemAviso"></div>
            <form id="formRegistro">
                <div class="input-block">
                    <label for="user">Nome Completo</label>
                    <input type="text" id="user" placeholder="Seu nome" required>
                </div>
                <div class="input-block">
                    <label for="email">E-mail Acadêmico</label>
                    <input type="email" id="email" placeholder="nome@exemplo.com" required>
                </div>
                <div class="input-block">
                    <label for="password">Senha de Acesso</label>
                    <input type="password" id="password" placeholder="Crie uma senha" required>
                </div>
                <button type="submit" class="btn-primary">Finalizar Cadastro</button>
            </form>
            <div class="footer-actions">
                <p>Já tem conta? <a href="index.html" class="link-red">Voltar ao Login</a></p>
            </div>
        </div>
    </div>
    <script src="scripts.js"></script>
</body>
</html>
